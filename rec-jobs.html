<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Jobs – BeyondMatch</title>
  <link rel="stylesheet" href="recruiter-matches.css" />
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar">
  <h2 class="brand">BeyondMatch</h2>

  <nav class="menu">
    <a href="rec-dash.html" class="menu-item">Dashboard</a>
        <a href="rec-jobs.html" class="menu-item active">My Jobs</a>
        <a href="cand-matches.html" class="menu-item">Candidate Matches</a>
    <a href="rec-actions.html" class="menu-item">Recruiter Actions</a>
    <a href="settings.html" class="menu-item">Settings</a>
    <button class="menu-item logout-btn" onclick="unifiedLogout()">⏻ Logout</button>
  </nav>
</aside>

<!-- ================= MAIN ================= -->
<main class="main jobs-modern">

  <div class="page-header-modern">
    <h1 id="jobsPageTitle">Loading...</h1>
    <p>Manage and view posted jobs</p>
  </div>

  <!-- FILTER BAR -->
  <div class="jobs-filter-modern">

    <div class="toggle-modern">
      <button id="myOrgBtn" class="toggle-pill active">My Organisation</button>
      <button id="allJobsBtn" class="toggle-pill secondary">All Jobs</button>
    </div>

    <select id="locationFilter" class="modern-select">
      <option value="">All Locations</option>
    </select>

    <select id="sortSelect" class="modern-select">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="title">Title A–Z</option>
    </select>

    <input
      type="text"
      id="searchInput"
      class="modern-search"
      placeholder="Search job title..."
    />

  </div>

  <!-- JOB GRID -->
  <div class="jobs-grid-wrapper">
    <div id="jobsTable" class="jobs-grid">
      Loading jobs...
    </div>
  </div>

</main>

<script type="module" src="api.js"></script>
<script type="module" src="auth.js"></script>
</body>
</html>
