<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Candidate → Job Matches</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- SIDEBAR -->
     <aside class="sidebar">
      <h2 class="brand">BeyondMatch</h2>
      <nav class="menu">
    <a href="candidate-dashboard.html" class="menu-item ">Dashboard</a>
    <a href="jobmatches.html" class="menu-item active">Job Matches</a>
    <a href="savedjobs.html" class="menu-item">Saved Jobs</a>
    <a href="locatehire.html" class="menu-item">LocateHire</a>
    <a href="settings.html" class="menu-item">Settings</a>
      </nav>
    <button class="menu-item logout-btn" onclick="unifiedLogout()">
  ⏻ Logout
</button>
    </aside>

<!-- MAIN -->
<div class="main">

  <!-- TITLE -->
  <div class="page-title">
    <h1>Job Matches by Candidate</h1>
    <p>Select a candidate to view matching job opportunities.</p>
  </div>

  <!-- SELECT CARD -->
 <div class="card large candidate-select-card">
    <label>Select Candidate</label>
<div class="candidate-actions">
  <select id="candidateSelect" class="dropdown"></select>
  <button class="btn" onclick="loadCandidateJobMatches()">View Matches</button>
</div>

  </div>

  <!-- RESULTS -->
<!-- RESULTS -->
<div class="card large matches-wrapper">

  <div class="matches-header">
    <h3>Matched Jobs</h3>

    <div class="match-filters">
      <select id="locationFilter" class="dropdown small">
        <option value="">All Locations</option>
      </select>

      <select id="matchFilter" class="dropdown small">
        <option value="">All Match %</option>
        <option value="50">50%+</option>
        <option value="60">60%+</option>
        <option value="70">70%+</option>
        <option value="80">80%+</option>
      </select>

      <select id="salarySort" class="dropdown small">
        <option value="">Salary</option>
        <option value="high">High → Low</option>
        <option value="low">Low → High</option>
      </select>
    </div>
  </div>

  <div id="matchesGrid" class="matches-grid"></div>

</div>

</div>
<script type="module" src="auth.js"></script>
<script type="module" src="candidate.js"></script>
<script type="module" src="api.js"></script>
</body>
</html>
